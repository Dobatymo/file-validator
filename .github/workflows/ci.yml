name: CI

on: [push]

jobs:

  lint:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-python@v5
      with:
        python-version: 3.8
    - name: Run linters
      run: |
        python -m pip install ruff
        python -m ruff format . --check
        python -m ruff check .

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 yields pdf test errors for no good reason. it works locally...
        # no wheels for rawpy on python 3.8 macos-14
        os: [ubuntu-22.04, macos-14]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        exclude:
        - os: macos-14
          python-version: '3.8'
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v8.0.0
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --all-extras
    - name: Run tests
      run: uv run --all-extras pytest -s -v
